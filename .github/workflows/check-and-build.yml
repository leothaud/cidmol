name: Check and build

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Check formatting
    runs-on: self-hosted
    steps:
      - name: Get Template Code
        uses: actions/checkout@v4
      - name: clang-format
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "./src"
          extensions: "cpp"
          clangFormatVersion: 20

  build:
    name: Build and test
    runs-on: self-hosted
    needs: lint
    container:
      image: leothaud/cidmol-build:latest
      options: --user 1002:1002
    steps:
      - name: Debug build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/debug-build"
          cd "$GITHUB_WORKSPACE/debug-build"
          cmake -G Ninja .. -DCMAKE_BUILD_TYPE=Debug
          cmake --build .
      - name: Multi-thread build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/multi-thread-build"
          cd "$GITHUB_WORKSPACE/debug-build"
          cmake -G Ninja .. -DCMAKE_BUILD_TYPE=Debug -DCORE_THREAD
          cmake --build .
      - name: Release build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-build"
          cd "$GITHUB_WORKSPACE/release-build"
          cmake -G Ninja .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: DenverCoder1/doxygen-github-pages-action@v2.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          config_file: GitDoxyfile