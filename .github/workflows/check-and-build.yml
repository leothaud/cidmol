name: Check and build

on:
  push:
    branches:
      - main
      
env:
  WORK_DIR: ${{ github.workspace }}/cidmol  # Available to all jobs and steps
jobs:
  build:
    name: Lint, build and test
    runs-on: ubuntu-latest
    container:
      image: leothaud/cidmol-build:latest
    steps:
      - name: Get Template Code
        run: |
          git clone https://github.com/leothaud/cidmol.git ${WORK_DIR}
      - name: clang-format-check
        run: |
          find ${WORK_DIR}/src -regex '.*\.\(cpp\)' -exec clang-format --dry-run --Werror {} +
          export res=$?
          echo "res = $res"
          $res
      - name: Debug build
        run: |
          mkdir -p "${WORK_DIR}/debug-build"
          cd "${WORK_DIR}/debug-build"
          cmake -G Ninja .. -DCMAKE_BUILD_TYPE=Debug
          cmake --build .
      - name: Release build
        run: |
          mkdir -p "${WORK_DIR}/release-build"
          cd "${WORK_DIR}/release-build"
          cmake -G Ninja .. -DCMAKE_BUILD_TYPE=Release
          cmake --build .
      - name: Run tests
        run: |
          cd "${WORK_DIR}/debug-build"
          cmake --build . --target test